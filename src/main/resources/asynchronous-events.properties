# Non-sensitive configuration for ac-loy-eventhub (zero-infra POC).
# No secrets or environment hosts required to run locally.

# HTTP listener (injector, mock downstream, health)
ac.loy.eventhub.http.port=8081

# VM queues (inbound transport + dead-letter). Production alternative: IBM MQ / Anypoint MQ.
ac.loy.eventhub.vm.inbound.queue=eventhub.inbound
ac.loy.eventhub.vm.dlq.queue=eventhub.dlq

# s-layer downstream "system of record" API.
# Defaults to the LOCAL mock flow in this same app (util/mock-downstream.xml).
# To hit a real system, change host/port below.
ac.loy.eventhub.downstream.host=localhost
ac.loy.eventhub.downstream.port=8081

# s-layer operation paths (full path, not relative to any basePath)
ac.loy.eventhub.sor.createProfile.path=/mock/system/records

# Routing registry (classpath resource read by the consumer)
ac.loy.eventhub.registry.file=notificationTypeToFlow.json

# Consumer tuning
ac.loy.eventhub.consumer.numberOfConsumers=4
ac.loy.eventhub.consumer.maxRedelivery=3

# Retry semantics: initial attempt + maxRedelivery republishes, then DLQ.
# deliveryCount travels inside the message envelope (payload.deliveryCount).
# 4th failure (deliveryCount > maxRedelivery) is parked on the DLQ.
ac.loy.eventhub.retry.maxDeliveryCount=3
